name: Deploy — Prod

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy (prod)
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    us-east-1

      # Terraform variables injected from GitHub secrets
      TF_VAR_anthropic_api_key:  ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_tavily_api_key:     ${{ secrets.TAVILY_API_KEY }}
      TF_VAR_gmail_address:      ${{ secrets.GMAIL_ADDRESS }}
      TF_VAR_gmail_app_password: ${{ secrets.GMAIL_APP_PASSWORD }}
      TF_VAR_to_email:           ${{ secrets.TO_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build Lambda package
        run: python scripts/build_lambda.py

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.7"

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/prod

      - name: Terraform Plan
        run: terraform plan
        working-directory: terraform/environments/prod

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform/environments/prod
